version: "3.9"

# Database is Neon (managed serverless Postgres, external to this compose file).
# No local "postgres" service — DATABASE_URL in .env must point at your Neon connection string.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-8000}
      ANTHROPIC_TIMEOUT_MS: ${ANTHROPIC_TIMEOUT_MS:-120000}
      ANTHROPIC_MAX_RETRIES: ${ANTHROPIC_MAX_RETRIES:-2}
      GENERATE_RATE_LIMIT_PER_MIN: ${GENERATE_RATE_LIMIT_PER_MIN:-10}
      GENERATE_MAX_PER_RUN: ${GENERATE_MAX_PER_RUN:-5}
    expose:
      - "${PORT}"
    ports:
      - "${PORT}:${PORT}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty = same-origin; nginx proxies /api to the backend container.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    environment:
      # Where nginx forwards /api and /health (the backend service + its PORT).
      BACKEND_ORIGIN: http://backend:${PORT}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
