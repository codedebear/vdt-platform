# Database is Neon (managed serverless Postgres, external to this compose file).
# No local "postgres" service — DATABASE_URL in .env must point at your Neon connection string.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-8000}
      ANTHROPIC_TIMEOUT_MS: ${ANTHROPIC_TIMEOUT_MS:-120000}
      ANTHROPIC_MAX_RETRIES: ${ANTHROPIC_MAX_RETRIES:-2}
      GENERATE_RATE_LIMIT_PER_MIN: ${GENERATE_RATE_LIMIT_PER_MIN:-10}
      GENERATE_MAX_PER_RUN: ${GENERATE_MAX_PER_RUN:-5}
      PROJECT_BUDGET_USD_DEFAULT: ${PROJECT_BUDGET_USD_DEFAULT:-0}
      ANTHROPIC_PRICE_INPUT_PER_MTOK: ${ANTHROPIC_PRICE_INPUT_PER_MTOK:-0}
      ANTHROPIC_PRICE_OUTPUT_PER_MTOK: ${ANTHROPIC_PRICE_OUTPUT_PER_MTOK:-0}
      INPUT_MAX_CHARS: ${INPUT_MAX_CHARS:-100000}
      PRIOR_OUTPUT_MAX_CHARS: ${PRIOR_OUTPUT_MAX_CHARS:-20000}
      ATTACHMENT_MAX_FILE_MB: ${ATTACHMENT_MAX_FILE_MB:-10}
      ATTACHMENT_MAX_PER_RUN: ${ATTACHMENT_MAX_PER_RUN:-5}
      ATTACHMENT_MAX_TOTAL_MB: ${ATTACHMENT_MAX_TOTAL_MB:-25}
      ATTACHMENT_RATE_LIMIT_PER_MIN: ${ATTACHMENT_RATE_LIMIT_PER_MIN:-20}
      ATTACHMENT_TEXT_CHAR_CAP: ${ATTACHMENT_TEXT_CHAR_CAP:-100000}
      BATCH_ENABLED: ${BATCH_ENABLED:-true}
      BATCH_POLL_INTERVAL_MS: ${BATCH_POLL_INTERVAL_MS:-30000}
      ANTHROPIC_BATCH_PRICE_FACTOR: ${ANTHROPIC_BATCH_PRICE_FACTOR:-0.5}
      BATCH_MAX_AGE_MS: ${BATCH_MAX_AGE_MS:-93600000}
      BATCH_SUBMIT_GRACE_MS: ${BATCH_SUBMIT_GRACE_MS:-300000}
      SECRETS_KEY: ${SECRETS_KEY:-}
    expose:
      - "${PORT}"
    ports:
      - "${PORT}:${PORT}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty = same-origin; nginx proxies /api to the backend container.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    environment:
      # Where nginx forwards /api and /health (the backend service + its PORT).
      BACKEND_ORIGIN: http://backend:${PORT}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
